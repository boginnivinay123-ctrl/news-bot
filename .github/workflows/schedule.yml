To write a bot that summarizes articles into 5–6 sentences, your code needs an AI "brain" to read the article's text and write the summary.

Since we are keeping this entirely free and hosting it on GitHub, we will use a completely free, open-source AI library called transformers with a pre-trained Google model (google/pegasus-xsum) to read the text and handle the summarization.

Here is your updated step-by-step implementation for the new script.

Step 1: Update Your Python Code (bot.py)
Go to your GitHub repository, click on bot.py, click the pencil icon ✏️ to edit it, erase everything inside, and paste this fresh script.

