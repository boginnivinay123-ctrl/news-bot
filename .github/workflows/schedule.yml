Yes, it is entirely possible! You can build this completely for free using Python, and you can host and schedule it directly on GitHub using GitHub Actions.

Instead of writing a complex and brittle web scraper that might break whenever the website layout changes, the most reliable and open-source way to extract news from media channels like Firstpost is by reading their RSS feeds or using Google News RSS tracking.

Here is the complete walkthrough and the exact code you need to set this up.

Part 1: The Python Bot Code (bot.py)
This script fetches the latest articles from Firstpost's RSS feed, prints them (or processes them), and ensures it only tracks new articles by saving a history file (processed_urls.txt).

Create a file named bot.py and paste the following code:

Python
import os
import xml.etree.ElementTree as ET
import requests

# URL for Firstpost RSS feed (You can swap this out for other RSS feeds if needed)
RSS_URL = "https://www.firstpost.com/commonfeeds/v1/mfp/rss/world.xml"
HISTORY_FILE = "processed_urls.txt"


def load_processed_urls():
    """Load previously scraped URLs so we don't duplicate efforts."""
    if os.path.exists(HISTORY_FILE):
        with open(HISTORY_FILE, "r", encoding="utf-8") as f:
            return set(line.strip() for line in f.readlines())
    return set()


def save_processed_url(url):
    """Append a newly scraped URL to our history tracking file."""
    with open(HISTORY_FILE, "a", encoding="utf-8") as f:
        f.write(f"{url}\n")


def fetch_news():
    print("Fetching news from Firstpost...")
    try:
        response = requests.get(RSS_URL, headers={"User-Agent": "Mozilla/5.0"})
        if response.status_code != 200:
            print(f"Failed to fetch data. Status code: {response.status_code}")
            return

        # Parse the XML data from the RSS feed
        root = ET.fromstring(response.content)
        processed_urls = load_processed_urls()
        new_stories_found = False

        # Loop through all news items inside the RSS XML structure
        for item in root.findall(".//item"):
            title = item.find("title").text
            link = item.find("link").text
            pub_date = (
                item.find("pubDate").text if item.find("pubDate") is not None else ""
            )

            # Check if we have seen this article before
            if link not in processed_urls:
                new_stories_found = True
                print("\n--- NEW ARTICLE FOUND ---")
                print(f"Title: {title}")
                print(f"Link: {link}")
                print(f"Published: {pub_date}")

                # Save to history so it won't trigger next time
                save_processed_url(link)

                # OPTIONAL: You can add code here to send this data to a Discord Webhook,
                # Telegram bot, or save it to a database/CSV.

        if not new_stories_found:
            print("No new articles since the last check.")

    except Exception as e:
        print(f"An error occurred: {e}")


if __name__ == "__main__":
    fetch_news()
Part 2: Automating it on GitHub (Every 3 Hours)
GitHub offers a built-in automation feature called GitHub Actions. It can spin up a virtual server, run your script, save the newly updated processed_urls.txt history file back into your repository, and shut down—all completely free.

1. Create the Workflow File
In your GitHub repository, you must create a specific folder structure for GitHub to recognize the automation. Create a file exactly at this path:
.github/workflows/schedule.yml

2. Paste the Workflow Code
Paste the following YAML configuration inside schedule.yml:

YAML
name: Trigger News Bot Every 3 Hours

on:
  schedule:
    # This CRON expression runs the script at minute 0, every 3 hours daily
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allows you to manually trigger the bot anytime from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      # Gives the bot permission to commit the history file back to your repo
      contents: write 

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Bot Script
      run: python bot.py

    - name: Commit and Push History Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add processed_urls.txt || true
        git commit -m "Automated Sync: Update processed news history" || true
        git push origin main || true
How to Set This Up in 4 Easy Steps
Create a GitHub Repository: Go to GitHub and create a new repository (it can be Public or Private).

Add Your Files: Upload or write the files exactly as structured above:

bot.py (in the root directory)

.github/workflows/schedule.yml (inside those specific subfolders)

Initialize the History File: Create an empty file named processed_urls.txt in your main folder so the script runs cleanly on its first pass.

Test Run: Go to the Actions tab on your GitHub repository page. Click on "Trigger News Bot Every 3 Hours" on the left sidebar, click Run workflow, and see your script execute in real time.

⚠️ A Note on GitHub Actions Schedules: GitHub handles cron jobs on a best-effort queue. While it is set to run exactly every 3 hours (0 */3 * * *), high demand on GitHub's free servers might occasionally delay the execution by a few minutes.

